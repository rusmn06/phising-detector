events {
    worker_connections 1024;
}

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
    
    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstream definitions (internal Docker network)
    upstream frontend_app {
        server frontend:80;
    }
    
    upstream api_backend {
        server backend:8000;
    }

    # ===========================================
    # HTTP → HTTPS Redirect (Force SSL)
    # ===========================================
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ===========================================
    # Main HTTPS Server Block
    # ===========================================
    server {
        listen 443 ssl http2;
        server_name _;  # Ganti dengan domain Azure nanti

        # SSL Configuration
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        
        # Modern SSL settings (A+ rating)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # ===========================================
        # ⭐ SECURITY HEADERS (WAJIB) ⭐
        # ===========================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Content Security Policy (strict - adjust as needed)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none';" always;
        
        # HSTS (force HTTPS for 1 year)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Rate Limiting Zone (10 req/sec per IP)
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
        limit_req_zone $binary_remote_addr zone=general_limit:10m rate=20r/s;

        # ===========================================
        # Frontend (React SPA)
        # ===========================================
        location / {
            limit_req zone=general_limit burst=20 nodelay;
            
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # React Router support
            try_files $uri $uri/ /index.html;
        }

        # ===========================================
        # Backend API (FastAPI)
        # ===========================================
        location /api/ {
            limit_req zone=api_limit burst=5 nodelay;
            
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeout settings for email analysis (bisa lama)
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            # Buffer settings for file upload
            client_max_body_size 10M;
            proxy_request_buffering off;
        }

        # ===========================================
        # Health Check Endpoint (for Azure LB)
        # ===========================================
        location /health {
            access_log off;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # ===========================================
        # Block Sensitive Paths
        # ===========================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}